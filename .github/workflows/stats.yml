name: Update Stats

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Stats card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: stats
          options: "username=Marcelo-C-Silva&show_icons=true&count_private=true&hide_border=true&bg_color=0d0d0d&title_color=00ff41&text_color=b0b0b0&icon_color=00cc33&ring_color=00ff41"
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Top languages card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: top-langs
          options: "username=Marcelo-C-Silva&layout=compact&langs_count=8&hide_border=true&bg_color=0d0d0d&title_color=00ff41&text_color=b0b0b0"
          path: profile/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit SVGs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add profile/
          git diff --staged --quiet || git commit -m "chore: update stats [skip ci]"
          git push
