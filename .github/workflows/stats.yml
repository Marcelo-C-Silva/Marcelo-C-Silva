name: Update Stats

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches: [main, master]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Generate Stats SVGs
        run: |
          mkdir -p profile
          node << 'SCRIPT'
          const https = require('https');
          const fs = require('fs');

          const BASE = 'https://github-readme-stats.vercel.app/api';
          const USER = 'Marcelo-C-Silva';
          const COLORS = 'hide_border=true&bg_color=0d0d0d&title_color=00ff41&text_color=b0b0b0&icon_color=00cc33&ring_color=00ff41';

          function download(url, dest) {
            return new Promise((resolve, reject) => {
              const file = fs.createWriteStream(dest);
              https.get(url, res => {
                res.pipe(file);
                file.on('finish', () => { file.close(); resolve(); });
              }).on('error', reject);
            });
          }

          async function run() {
            await download(
              `${BASE}?username=${USER}&show_icons=true&count_private=true&include_all_commits=true&${COLORS}`,
              'profile/stats.svg'
            );
            console.log('stats.svg gerado');

            await download(
              `${BASE}/top-langs?username=${USER}&layout=compact&langs_count=8&${COLORS}`,
              'profile/top-langs.svg'
            );
            console.log('top-langs.svg gerado');
          }

          run().catch(e => { console.error(e); process.exit(1); });
          SCRIPT

      - name: Commit SVGs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add profile/
          git diff --staged --quiet || (git commit -m "chore: update stats [skip ci]" && git pull --rebase && git push)
